---
- name: Step 1 - Install Base Packages  # Bước 1 - Cài đặt các system packages cơ bản
  hosts: all
  become: yes
  tasks:
    - name: Install curl
      apt:
        name: curl
        update_cache: yes
        state: present

- name: Step 2 - Provision Master Node (8GB)  # Bước 2 - Khởi tạo Master Node (Control Plane)
  hosts: master
  become: yes
  tasks:
    - name: Install K3s Control Plane
      shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /etc/rancher/k3s/k3s.yaml

    - name: Wait for K3s initialization  # Chờ K3s khởi động
      wait_for:
        path: /var/lib/rancher/k3s/server/node-token
        timeout: 60

    - name: Read K3s Node Token  # Lay token xác thực của cụm
      command: cat /var/lib/rancher/k3s/server/node-token
      register: k3s_token_raw

    - name: Store Token for Worker nodes  # Lưu token vào Ansible facts để cấp quyền join cụm cho Worker
      add_host:
        name: "K3S_INFO"
        token: "{{ k3s_token_raw.stdout }}"
        master_ip: "{{ ansible_host }}"
        
    - name: Install kubeseal CLI on Master  # Cài đặt kubeseal CLI phục vụ việc mã hóa Secrets
      shell: |
        curl -sL https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.26.2/kubeseal-0.26.2-linux-amd64.tar.gz | tar -xz kubeseal
        install -m 755 kubeseal /usr/local/bin/kubeseal
      args:
        creates: /usr/local/bin/kubeseal

- name: Step 3 - Provision Worker Node (2GB) & Join Cluster  # Bước 3 - Khởi tạo Worker Node và thiết lập kết nối vào Cluster
  hosts: worker
  become: yes
  tasks:
    - name: Download K3s install script to Worker  # Tải trước script cài đặt K3s (Tối ưu hóa pipeline, tránh timeout)
      get_url:
        url: https://get.k3s.io
        dest: /tmp/install-k3s.sh
        mode: '0755'

    - name: Install K3s Agent and Join Master  # Thực thi script Agent và cấu hình thông số kết nối (K3S_URL)
      command: /tmp/install-k3s.sh
      environment:
        K3S_URL: "https://{{ hostvars['K3S_INFO']['master_ip'] }}:6443"
        K3S_TOKEN: "{{ hostvars['K3S_INFO']['token'] }}"
      args:
        creates: /etc/rancher/k3s/k3s-agent.env

- name: Step 4 - Bootstrap ArgoCD  # Bước 4 - Triển khai ArgoCD (GitOps Controller)
  hosts: master
  become: yes
  tasks:
    - name: Create ArgoCD Namespace
      shell: k3s kubectl create namespace argocd --dry-run=client -o yaml | k3s kubectl apply -f -

    - name: Install ArgoCD Core  # Sử dụng Server-Side Apply để vượt qua giới hạn kích thước 256KB annotation của CRDs
      command: k3s kubectl apply --server-side --force-conflicts -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml 
      
    - name: Copy ArgoCD App-of-Apps manifest to Master  # Truyền cấu hình App-of-Apps sang Master Node
      copy:
        src: ../argocd/argocd-app.yaml  
        dest: /tmp/argocd-app.yaml

    - name: Apply ArgoCD App-of-Apps (Bootstrap)  # Khởi chạy manifest gốc để kích hoạt tiến trình tự động đồng bộ GitOps
      command: k3s kubectl apply -f /tmp/argocd-app.yaml
      
- name: Step 5 - Post-Provisioning (Auto Seal Secret)  # Bước 5 - Tự động hóa mã hóa bảo mật sau khi GitOps đã chạy
  hosts: master
  become: yes
  tasks:
    - name: Wait for ArgoCD synchronization and Sealed Secrets Controller initialization  # Delay có chủ đích để chờ ArgoCD cài đặt xong các dependencies
      pause:
        seconds: 90
        prompt: "Waiting for ArgoCD to deploy Sealed Secrets Controller..."

    - name: Retrieve Public Certificate from Sealed Secrets Controller  # Trích xuất Public Key từ controller mới được tạo
      shell: sudo KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubeseal --fetch-cert --controller-namespace kube-system --controller-name sealed-secrets-controller > /tmp/pub-cert.pem

    - name: Generate and encrypt generic secret via Asymmetric Cryptography  # Khởi tạo Secret nguyên bản và mã hóa ngay lập tức bằng thuật toán bất đối xứng
      shell: |
        sudo k3s kubectl create secret generic redis-password --namespace boutique --from-literal=redis-password="23520249" --dry-run=client -o yaml | \
        sudo KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubeseal --format=yaml --cert=/tmp/pub-cert.pem > /tmp/redis-sealed.yaml

    - name: Retrieve encrypted manifest to Control Node for Git commit  # Kéo file đã mã hóa về máy Control để chuẩn bị đẩy lên VCS
      fetch:
        src: /tmp/redis-sealed.yaml
        dest: ~/proactive-scaling-microservices/infra/security/redis-sealed.yaml
        flat: yes
