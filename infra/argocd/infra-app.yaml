apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infrastructure-tools
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/hmdat-1706/proactive-scaling-microservices.git'
    targetRevision: main
    path: infra
    directory:
      recurse: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
