# 1. Scale Frontend
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: frontend-proactive-scaler
  namespace: boutique
spec:
  scaleTargetRef:
    name: frontend 
  minReplicaCount: 1
  maxReplicaCount: 15 
  triggers:
  - type: prometheus
    metadata:
      serverAddress: http://prometheus-server.monitoring.svc.cluster.local:80
      metricName: prophet_predicted_rps
      query: sum(prophet_predicted_rps)
      threshold: "20"
  - type: cpu
    metadata:
      type: Utilization
      value: "80"

