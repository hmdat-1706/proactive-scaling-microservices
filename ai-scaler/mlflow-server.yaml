apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-storage-pvc
  namespace: boutique
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-server
  namespace: boutique
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
      - name: mlflow
        image: ghcr.io/mlflow/mlflow:v2.11.1
        command:
          - mlflow
          - server
          - --backend-store-uri
          - sqlite:////mlflow/mlflow.db
          - --default-artifact-root
          - /mlflow/artifacts
          - --serve-artifacts
          - --host
          - 0.0.0.0
          - --port
          - "5000"
        ports:
        - containerPort: 5000
        volumeMounts:
        - name: mlflow-storage
          mountPath: /mlflow
      volumes:
      - name: mlflow-storage
        persistentVolumeClaim:
          claimName: mlflow-storage-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-service
  namespace: boutique
spec:
  ports:
  - port: 5000
    targetPort: 5000
    name: http-mlflow
  selector:
    app: mlflow
