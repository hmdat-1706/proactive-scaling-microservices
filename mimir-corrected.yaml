apiVersion: v1
kind: ConfigMap
metadata:
  name: mimir-config
  namespace: monitoring
data:
  mimir.yaml: |
    multitenancy_enabled: false
    blocks_storage:
      backend: filesystem
      bucket_store:
        sync_dir: /data/mimir/tsdb-sync
      filesystem:
        dir: /data/mimir/data
    compactor:
      data_dir: /data/mimir/compactor
    ingester:
      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: inmemory
        replication_factor: 1
    store_gateway:
      sharding_ring:
        replication_factor: 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mimir
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mimir
  template:
    metadata:
      labels:
        app: mimir
    spec:
      containers:
      - name: mimir
        image: grafana/mimir:latest
        args:
        - "-config.file=/etc/mimir/mimir.yaml"
        ports:
        - containerPort: 9009
        volumeMounts:
        - name: config-volume
          mountPath: /etc/mimir
      volumes:
      - name: config-volume
        configMap:
          name: mimir-config
